services:
  news-feed:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: news-feed
    ports:
      - "8003:8003"
    environment:
      - BOT_MANAGER_URL=http://host.docker.internal:5002
      - SERVICE_ID=news-feed-1
      - SERVICE_PORT=8003
      - SECRET_KEY=news-feed-secret-key
      # Set API_KEY to enable auth on all /api/* endpoints
      - API_KEY=
      # Set SERVICE_API_KEY to authenticate with Bot Manager
      - SERVICE_API_KEY=
      # Set to >0 to enable built-in scheduler (e.g. 60 = run all bots every hour)
      - SCHEDULE_INTERVAL_MINUTES=0
      # Concurrent bots in batch/scheduled runs
      - BATCH_MAX_WORKERS=5
      # Data directory inside container (mounted below)
      - DATA_DIR=/app/data
      # LibreTranslate URL (auto-set when using this compose file)
      - LIBRETRANSLATE_URL=http://libretranslate:5000
    volumes:
      - ./data:/app/data
    depends_on:
      libretranslate:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  libretranslate:
    image: libretranslate/libretranslate:latest
    container_name: libretranslate
    ports:
      - "5005:5000"
    environment:
      - LT_LOAD_ONLY=en,fa
      - LT_DISABLE_WEB_UI=true
    volumes:
      - libretranslate-data:/home/libretranslate/.local
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5000/languages | grep -q 'Persian' || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 120s

volumes:
  libretranslate-data:

networks:
  default:
    name: news-feed-network
